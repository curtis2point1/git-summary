# GoReleaser configuration for git-summary
# Run: goreleaser release --clean

project_name: git-summary

before:
  hooks:
    - go mod tidy

builds:
  - id: git-summary
    main: ./cmd/git-summary
    binary: git-summary
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: git-summary
    repository:
      owner: curtis2point1
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/curtis2point1/git-summary"
    description: "A fast TUI to see the status of all git repositories"
    license: "MIT"
    install: |
      bin.install "git-summary"
    test: |
      system "#{bin}/git-summary", "help"
